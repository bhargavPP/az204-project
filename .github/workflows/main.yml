name: Deploy Azure Function

on:
  push:
    branches:
      - master

env:
  AZURE_FUNCTIONAPP_NAME: delivery-functions-g7bchmc3f2ejhmhd
  DOTNET_VERSION: '8.0.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Build Function App
      run: dotnet build Delivery.Functions/Delivery.Functions.csproj --configuration Release

    - name: Publish Function App
      run: |
        dotnet publish Delivery.Functions/Delivery.Functions.csproj \
          --configuration Release \
          --output publish

    - name: Deploy to Azure Functions
      uses: Azure/functions-action@v1
      with:
        app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
        package: publish
        publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
